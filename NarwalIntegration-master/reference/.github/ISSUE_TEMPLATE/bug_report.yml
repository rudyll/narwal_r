name: Bug Report
description: Report a bug or issue with the Narwal integration
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue! Please fill out the details below so we can diagnose the problem quickly.

  - type: input
    id: narwal_model
    attributes:
      label: Narwal Model
      description: Which Narwal vacuum do you have? (e.g., Flow, Freo Z10 Ultra, Freo X Plus)
      placeholder: "Narwal Flow (AX12)"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: "Found in Settings > About"
      placeholder: "2026.3.0"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      description: "Found in HACS or the manifest.json file"
      placeholder: "0.3.0"
    validations:
      required: true

  - type: dropdown
    id: installation_method
    attributes:
      label: Installation Method
      options:
        - HACS
        - Manual
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: "Describe the issue..."
    validations:
      required: true

  - type: textarea
    id: port_scan
    attributes:
      label: Port Scan Results
      description: |
        Run `nmap -p 9002 <vacuum-ip>` from the same network as Home Assistant and paste the results.
        If port 9002 is closed, run `nmap -sV <vacuum-ip>` to show all open ports.
      render: text
    validations:
      required: false

  - type: textarea
    id: debug_logs
    attributes:
      label: Debug Logs
      description: |
        Enable debug logging by adding this to your `configuration.yaml`, then restart HA and reproduce the issue:
        ```yaml
        logger:
          logs:
            custom_components.narwal: debug
        ```
        Paste the relevant log output from Settings > System > Logs (filter for "narwal").
      render: text
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information (screenshots, network setup, etc.)
    validations:
      required: false
