name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for improving the integration? We'd love to hear it!

  - type: input
    id: narwal_model
    attributes:
      label: Narwal Model
      description: Which Narwal vacuum do you have?
      placeholder: "Narwal Flow (AX12)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like to see? Why would it be useful?
    validations:
      required: true
